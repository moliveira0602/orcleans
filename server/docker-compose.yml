version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: orca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orca
      POSTGRES_PASSWORD: orca_password
      POSTGRES_DB: orca_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca -d orca_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orca-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  postgres_data:
