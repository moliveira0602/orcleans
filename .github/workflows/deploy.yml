name: VPS Deployment - Usando Root (Shell Access Desabilitado)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Add host to known_hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p 22022 -t rsa 162.240.163.208 >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Executing remote ssh commands as ROOT
      env:
        VPS_PASSWORD: ${{ secrets.VPS_ROOT_PASSWORD }}
      run: |
        # Verificar se a password está definida
        if [ -z "$VPS_PASSWORD" ]; then
          echo "ERROR: VPS_ROOT_PASSWORD secret is not set"
          exit 1
        fi

        sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no -p 22022 root@162.240.163.208 << 'REMOTESCRIPT'
          # 1. Atualizar código fonte COMO ROOT
          echo "🔧 Iniciando deploy como root (shell do orcaleads desabilitado)..."

          # Mudar para pasta do projeto
          cd /home/orcaleads/orcleans

          # Preservar envs antes do reset
          [ -f .env.production ] && cp .env.production /tmp/orca_env_production.bak || true
          [ -f server/.env ] && cp server/.env /tmp/orca_server_env.bak || true

          # Atualizar código
          echo "🔄 Atualizando código..."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          git update-index --assume-unchanged package-lock.json

          # Restaurar envs
          [ -f /tmp/orca_env_production.bak ] && cp /tmp/orca_env_production.bak .env.production || true
          [ -f /tmp/orca_server_env.bak ] && cp /tmp/orca_server_env.bak server/.env || true

          # 2. OTIMIZAÇÕES DE MEMÓRIA
          echo "⚙️ Configurando otimizações..."
          export NODE_OPTIONS=--max-old-space-size=1024

          # 3. EXECUTAR BUILD COMO ROOT (funciona conforme teste)
          echo "🏗️ Executando build como root..."
          if npm run build 2>&1; then
            echo "✅ Build bem-sucedido"
          else
            echo "❌ Build falhou, tentando alternativa..."
            npm cache clean --force
            NODE_ENV=production npm run build -- --mode production || {
              echo "❌ ERRO CRÍTICO no build"
              exit 1
            }
          fi

          # 4. VERIFICAR BUILD
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "❌ ERRO: Pasta dist/ vazia"
            ls -la dist/ 2>/dev/null || echo "Pasta dist não existe"
            exit 1
          fi

          echo "📁 Build gerado: $(find dist -type f | wc -l) arquivos"

          # 5. DEPLOY PARA public_html
          echo "🚀 Realizando deploy..."

          # Limpar public_html (preservar .well-known para SSL)
          find /home/orcaleads/public_html -maxdepth 1 -type f -delete 2>/dev/null || true
          rm -rf /home/orcaleads/public_html/assets 2>/dev/null || true
          rm -rf /home/orcaleads/public_html/images 2>/dev/null || true

          # Copiar novos arquivos
          cp -r dist/. /home/orcaleads/public_html/

          # 6. CORRIGIR PERMISSÕES E PROPRIEDADE
          echo "🔐 Ajustando permissões..."

          # Mudar dono para orcaleads (root criou os arquivos)
          chown -R orcaleads:orcaleads /home/orcaleads/public_html

          # Ajustar permissões para HostGator
          find /home/orcaleads/public_html -type f -exec chmod 644 {} \;
          find /home/orcaleads/public_html -type d -exec chmod 755 {} \;

          # Ajustar permissão da própria pasta home
          chmod 711 /home/orcaleads

          # 7. VERIFICAÇÃO
          echo "🔍 Verificando deploy..."
          echo "   Public_html: $(ls -la /home/orcaleads/public_html/ | wc -l) itens"
          echo "   Dono: $(stat -c %U /home/orcaleads/public_html/index.html 2>/dev/null || echo 'desconhecido')"
          echo "   Permissões: $(stat -c %a /home/orcaleads/public_html/index.html 2>/dev/null || echo 'desconhecido')"

          # 8. BACKEND (API)
          echo "🔧 Configurando backend..."
          cd /home/orcaleads/orcleans/server

          # Instalar dependências e buildar
          npm install
          npm run build
          npx prisma generate

          # Reiniciar API via pm2 (usa dist/index.js compilado)
          echo "🔄 Reiniciando API..."
          pm2 restart orca-api 2>/dev/null || {
            echo "🚀 Iniciando API..."
            pm2 start dist/index.js --name orca-api --update-env || {
              echo "⚠️ Não foi possível iniciar API, verifique manualmente"
            }
          }

          # 9. CONCLUSÃO
          echo ""
          echo "🎉 DEPLOY CONCLUÍDO!"
          echo "===================="
          echo "📌 Usado root devido a limite de processos do usuário orcaleads (35)"
          echo "📁 Site: /home/orcaleads/public_html/"
          echo "🔐 Permissões ajustadas para orcaleads"
          echo ""
          echo "💡 Para usar orcaleads no futuro:"
          echo "   1. Reiniciar servidor para aplicar limites de /etc/security/limits.conf"
          echo "   2. Ou configurar sudo sem senha para npm run build"
          echo ""
          echo "⏱️  Deploy finalizado: $(date)"
        REMOTESCRIPT