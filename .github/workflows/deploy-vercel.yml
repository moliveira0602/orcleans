name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --scope moliveira0602s-projects

  deploy-server:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - run: cd server && npm ci
      - run: cd server && npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --scope moliveira0602s-projects --name orca-api